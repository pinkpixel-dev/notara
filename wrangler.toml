name = "notara"
compatibility_date = "2023-01-01"

# Pages settings
pages_build_output_dir = "dist"

# Environment variables that can be accessed at build time
[vars]
VITE_APP_ENV = "production"

# Production environment
[env.production.vars]
VITE_APP_ENV = "production"

# Preview environment for Pages
[env.preview.vars]
VITE_APP_ENV = "development"

# Secrets (configure these with `wrangler secret put <NAME>` and NEVER commit actual values)
# Example:
#   wrangler secret put VITE_SUPABASE_URL
#   wrangler secret put VITE_SUPABASE_ANON_KEY
#   wrangler secret put VITE_GITHUB_CLIENT_ID
#   wrangler secret put VITE_GITHUB_CLIENT_SECRET
#   wrangler secret put POLLINATIONS_API_TOKEN
