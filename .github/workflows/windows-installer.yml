name: Desktop Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-linux-bundles:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Linux bundles
        env:
          NO_STRIP: "YES"
        run: npm run tauri:build:linux

      - name: Upload Debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: notara-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: notara-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  build-windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build NSIS installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Notara v__VERSION__
          releaseBody: Windows installer generated by GitHub Actions.
          releaseDraft: true
          prerelease: false
          args: --bundles nsis

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: notara-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
